version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: clinerva_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: clinerva
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - clinerva_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  mongo-express:
    image: mongo-express:latest
    container_name: clinerva_mongo_express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - clinerva_network

  # Optional: Node.js backend service (uncomment to use Docker for backend too)
  # backend:
  #   build: .
  #   container_name: clinerva_backend
  #   environment:
  #     NODE_ENV: development
  #     MONGODB_URI: mongodb://admin:password123@mongodb:27017/clinerva
  #     PORT: 5001
  #   ports:
  #     - "5001:5001"
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   networks:
  #     - clinerva_network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  clinerva_network:
    driver: bridge

# Usage:
# ------
# Start services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f
#
# Access MongoDB UI:
#   http://localhost:8081
#   Username: admin
#   Password: pass
#
# Connect from app:
#   MONGODB_URI=mongodb://admin:password123@localhost:27017/clinerva
#
# Stop services:
#   docker-compose down
#
# Remove volumes (delete data):
#   docker-compose down -v
